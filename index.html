<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediStock · Department Inventory System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f4f7fc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* Login Page Styles */
    .login-container {
      max-width: 420px;
      width: 90%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 40px 32px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header i {
      font-size: 48px;
      color: #2563eb;
      background: #eef2ff;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }
    .login-header p {
      color: #64748b;
      margin-top: 4px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-form label {
      font-weight: 600;
      font-size: 14px;
      color: #334155;
    }
    .login-form input, .login-form select {
      padding: 12px 14px;
      border: 1px solid #d1d9e6;
      border-radius: 18px;
      font-size: 15px;
      width: 100%;
      background: #fafcff;
      transition: 0.1s;
      font-family: 'Inter', sans-serif;
    }
    .login-form input:focus, .login-form select:focus {
      outline: 2px solid #2563eb;
      border-color: transparent;
    }
    .login-error {
      color: #b91c1c;
      font-size: 14px;
      text-align: center;
      display: none;
      background: #fee2e2;
      padding: 10px;
      border-radius: 12px;
    }
    .btn-login {
      background: #2563eb;
      border: none;
      color: white;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-login:hover { background: #1d4ed8; transform: scale(0.97); }
    .btn-logout {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-logout:hover { background: #fecaca; }

    /* Dashboard Styles */
    .app-wrapper {
      max-width: 1500px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 28px 32px 32px;
      display: none;
    }
    .app-wrapper.active {
      display: block;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-left i {
      font-size: 28px;
      color: #2563eb;
      background: #eef2ff;
      padding: 12px;
      border-radius: 16px;
    }
    .header-left h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #0f172a;
    }
    .header-left span {
      font-weight: 400;
      color: #64748b;
      font-size: 18px;
      margin-left: 6px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-badge {
      background: #eef2ff;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      color: #1e3a8a;
    }
    .stats-badge {
      display: flex;
      align-items: center;
      gap: 24px;
      background: #f8fafc;
      padding: 8px 20px 8px 18px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-item i { font-size: 18px; color: #2563eb; }
    .stat-item .num { font-weight: 700; font-size: 18px; color: #0f172a; }
    .stat-item .label { color: #475569; font-size: 14px; }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .btn {
      border: none;
      background: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      transition: 0.15s;
      color: #1e293b;
      background: #f9f9fc;
    }
    .btn-primary {
      background: #2563eb;
      border: 1px solid #2563eb;
      color: white;
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.2);
    }
    .btn-primary i { color: white; }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; transform: scale(0.97); }
    .btn-outline:hover { background: #f1f5f9; border-color: #cbd5e1; }

    .btn-remove {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-remove:hover {
      background: #fecaca;
      transform: scale(1.05);
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      background: #f9fafb;
      padding: 12px 18px;
      border-radius: 60px;
      margin-bottom: 28px;
      border: 1px solid #eef2f6;
    }
    .filter-bar i { color: #64748b; font-size: 16px; }
    .filter-bar input, .filter-bar select {
      border: none;
      background: transparent;
      padding: 8px 4px;
      font-size: 14px;
      font-weight: 500;
      color: #0f172a;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .filter-bar input::placeholder { color: #94a3b8; font-weight: 400; }
    .filter-bar select { cursor: pointer; }
    .search-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 200px;
      background: white;
      padding: 0 16px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
    }
    .search-wrapper i { color: #94a3b8; }
    .search-wrapper input { width: 100%; }
    .filter-select { background: white; border: 1px solid #e2e8f0; border-radius: 40px; padding: 0 16px; }

    .dept-section {
      margin-bottom: 32px;
      border: 1px solid #eef2f6;
      border-radius: 20px;
      overflow: hidden;
      background: white;
    }
    .dept-section:last-child { margin-bottom: 0; }
    .dept-header {
      background: #f8fafc;
      padding: 16px 20px;
      border-bottom: 2px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .dept-header h2 {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dept-header h2 i { color: #2563eb; }
    .dept-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #475569;
    }
    .dept-stats span {
      background: white;
      padding: 4px 14px;
      border-radius: 30px;
      border: 1px solid #e2e8f0;
    }
    .dept-stats .count { background: #eef2ff; border-color: #c7d2fe; }
    .dept-stats .low { background: #fef9c3; border-color: #fde047; }

    .dept-table-wrap { overflow-x: auto; }
    .dept-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 1000px;
    }
    .dept-table-wrap th {
      text-align: left;
      padding: 14px 16px;
      background: #fafcff;
      font-weight: 600;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    .dept-table-wrap td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .dept-table-wrap tr:last-child td { border-bottom: none; }
    .dept-table-wrap .item-row:hover td { background: #fafcff; }

    .item-name { font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .item-name i { color: #2563eb; font-size: 16px; width: 24px; }

    .stock-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
    }
    .stock-ok { background: #dcfce7; color: #166534; }
    .stock-low { background: #fef9c3; color: #854d0e; }
    .stock-critical { background: #fee2e2; color: #991b1b; }

    .condition-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
    }
    .condition-new { background: #dcfce7; color: #166534; }
    .condition-good { background: #e0f2fe; color: #0369a1; }
    .condition-fair { background: #fef9c3; color: #854d0e; }
    .condition-poor { background: #fee2e2; color: #991b1b; }
    .condition-repair { background: #f3e8ff; color: #6b21a8; }

    .action-icons {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }
    .action-icons i {
      cursor: pointer;
      font-size: 18px;
      transition: 0.1s;
      color: #64748b;
    }
    .action-icons i:hover { color: #2563eb; transform: scale(1.1); }
    .action-icons i.fa-trash-can:hover { color: #b91c1c; }

    /* ========== MODAL WITH SCROLL BAR ========== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-card {
      background: white;
      max-width: 560px;
      width: 90%;
      border-radius: 32px;
      padding: 32px 32px 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      transform: scale(0.96);
      transition: 0.2s;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .modal-overlay.active .modal-card { transform: scale(1); }
    .modal-card h2 {
      font-size: 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .modal-card h2 i { color: #2563eb; }
    
    /* Scrollable form container */
    .modal-form-scroll {
      overflow-y: auto;
      padding-right: 4px;
      flex: 1;
      max-height: calc(90vh - 140px);
    }
    .modal-form-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .modal-form-scroll::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    .modal-form-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .modal-form-scroll::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 4px;
    }
    .modal-form label {
      font-weight: 600;
      font-size: 14px;
      color: #334155;
      margin-bottom: 2px;
    }
    .modal-form input, .modal-form select {
      padding: 10px 14px;
      border: 1px solid #d1d9e6;
      border-radius: 18px;
      font-size: 15px;
      width: 100%;
      background: #fafcff;
      transition: 0.1s;
    }
    .modal-form input:focus, .modal-form select:focus {
      outline: 2px solid #2563eb;
      border-color: transparent;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
      flex-shrink: 0;
      padding-top: 12px;
      border-top: 1px solid #eef2f6;
    }
    .modal-actions .btn { padding: 12px 28px; }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #0f172a;
      color: white;
      padding: 16px 28px;
      border-radius: 60px;
      font-weight: 500;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateY(80px);
      opacity: 0;
      transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      z-index: 2000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { font-size: 20px; color: #4ade80; }
    .toast.error i { color: #f87171; }

    .footer-note {
      text-align: right;
      font-size: 13px;
      color: #94a3b8;
      padding-top: 12px;
      border-top: 1px solid #ecf1f7;
      margin-top: 6px;
    }

    @media (max-width: 640px) {
      .app-wrapper { padding: 20px; }
      .header-left h1 { font-size: 20px; }
      .stats-badge { flex-wrap: wrap; gap: 8px; }
      .dept-header { flex-direction: column; align-items: flex-start; }
      .login-container { padding: 24px; }
      .modal-card { padding: 24px 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="loginPage" class="login-container">
  <div class="login-header">
    <i class="fas fa-hospital"></i>
    <h1>MediStock</h1>
    <p>Department Inventory System</p>
  </div>
  <form class="login-form" id="loginForm">
    <div class="login-error" id="loginError">Invalid credentials. Please try again.</div>
    <div>
      <label>Select Department</label>
      <select id="loginDepartment" required>
        <option value="">— Choose your department —</option>
        <option value="Emergency">🟥 Emergency</option>
        <option value="ICU">🟨 ICU</option>
        <option value="Pharmacy">🟩 Pharmacy</option>
        <option value="Laboratory">🟪 Laboratory</option>
        <option value="Radiology">🟦 Radiology</option>
        <option value="Ward">🟧 Ward</option>
        <option value="Surgery">🟦 Surgery</option>
        <option value="Admin">⬜ Admin</option>
      </select>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter department password" required>
    </div>
    <button type="submit" class="btn-login">Login</button>
  </form>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div class="app-wrapper" id="dashboard">
  <div class="header">
    <div class="header-left">
      <i class="fas fa-hospital"></i>
      <h1>MediStock <span>· department-wise</span></h1>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">Emergency</span>
      <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus-circle"></i> Add item</button>
    <button class="btn btn-outline" id="resetFilterBtn"><i class="fas fa-rotate-left"></i> Reset filters</button>
  </div>

  <div class="filter-bar">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, code, category...">
    </div>
    <div class="filter-select">
      <i class="fas fa-tag" style="margin-right: 6px;"></i>
      <select id="categoryFilter">
        <option value="all">All categories</option>
        <option value="Surgical">Surgical</option>
        <option value="Medication">Medication</option>
        <option value="Diagnostic">Diagnostic</option>
        <option value="Personal Protective">Personal Protective</option>
        <option value="Furniture">Furniture</option>
        <option value="Consumable">Consumable</option>
      </select>
    </div>
    <div class="filter-select">
      <i class="fas fa-circle-exclamation" style="margin-right: 6px;"></i>
      <select id="stockFilter">
        <option value="all">Stock status</option>
        <option value="low">Low stock</option>
        <option value="critical">Critical</option>
        <option value="ok">In stock</option>
      </select>
    </div>
  </div>

  <div id="departmentContainer"></div>

  <div class="footer-note">
    <i class="fas fa-shield-alt" style="margin-right: 6px; color:#2563eb;"></i> Department-wise inventory · <span id="updateTime">just now</span>
  </div>
</div>

<!-- ==================== MODAL WITH SCROLL ==================== -->
<div class="modal-overlay" id="itemModal">
  <div class="modal-card">
    <h2><i class="fas fa-pen-to-square"></i> <span id="modalTitle">Add item</span></h2>
    
    <!-- Scrollable form container -->
    <div class="modal-form-scroll">
      <form class="modal-form" id="itemForm">
        <input type="hidden" id="itemIdField" value="">
        <div>
          <label>Item Code</label>
          <input type="text" id="itemCode" placeholder="e.g. MED-001" required>
        </div>
        <div>
          <label>Item Name</label>
          <input type="text" id="itemName" placeholder="e.g. Surgical mask (box)" required>
        </div>
        <div>
          <label>Category</label>
          <select id="itemCategory" required>
            <option value="Surgical">Surgical</option>
            <option value="Medication">Medication</option>
            <option value="Diagnostic">Diagnostic</option>
            <option value="Personal Protective">Personal Protective</option>
            <option value="Furniture">Furniture</option>
            <option value="Consumable">Consumable</option>
          </select>
        </div>
        <div>
          <label>Department</label>
          <select id="itemDepartment" required>
            <option value="Emergency">Emergency</option>
            <option value="ICU">ICU</option>
            <option value="Pharmacy">Pharmacy</option>
            <option value="Laboratory">Laboratory</option>
            <option value="Radiology">Radiology</option>
            <option value="Ward">Ward</option>
            <option value="Surgery">Surgery</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div>
          <label>Current Quantity</label>
          <input type="number" id="itemQuantity" min="0" placeholder="0" required>
        </div>
        <div>
          <label>Cost (₹)</label>
          <input type="number" id="itemCost" min="0" step="0.01" placeholder="e.g. 150.00" required>
        </div>
        <div>
          <label>Responsible Person</label>
          <input type="text" id="itemResponsible" placeholder="e.g. Dr. Sarah Chen" required>
        </div>
        <div>
          <label>Condition</label>
          <select id="itemCondition" required>
            <option value="New">New</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
            <option value="Repair">Repair</option>
          </select>
        </div>
        <div>
          <label>Low Stock Alert Level</label>
          <input type="number" id="itemAlertLevel" min="1" placeholder="e.g. 10" required>
          <small style="color:#64748b; display:block; margin-top:4px;">When quantity is below this number, item shows as "Low Stock" or "Critical"</small>
        </div>
        
        <!-- Buttons inside the scrollable area -->
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="closeModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveItemBtn"><i class="fas fa-floppy-disk"></i> Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ==================== TOAST ==================== -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMessage">Item saved</span></div>

<script>
  (function() {
    // ==================== DEPARTMENTS & PASSWORDS ====================
    const DEPARTMENTS = {
      'Emergency': { password: 'emergency123', icon: 'fa-truck-medical' },
      'ICU': { password: 'icu123', icon: 'fa-bed' },
      'Pharmacy': { password: 'pharmacy123', icon: 'fa-prescription-bottle' },
      'Laboratory': { password: 'lab123', icon: 'fa-flask' },
      'Radiology': { password: 'radiology123', icon: 'fa-x-ray' },
      'Ward': { password: 'ward123', icon: 'fa-hospital-user' },
      'Surgery': { password: 'surgery123', icon: 'fa-scalpel' },
      'Admin': { password: 'admin123', icon: 'fa-user-tie' }
    };

    // ==================== INVENTORY DATA ====================
    // Default data
    const defaultInventory = [
      // Emergency Department
      { id: 1, code: 'EM-001', name: 'Surgical mask (box)', category: 'Personal Protective', department: 'Emergency', quantity: 45, cost: 150.00, responsible: 'Dr. Sarah Chen', condition: 'New', alertLevel: 10 },
      { id: 2, code: 'EM-002', name: 'Blood pressure monitor', category: 'Diagnostic', department: 'Emergency', quantity: 6, cost: 2500.00, responsible: 'Dr. Sarah Chen', condition: 'New', alertLevel: 5 },
      { id: 3, code: 'EM-003', name: 'Thermometer (digital)', category: 'Diagnostic', department: 'Emergency', quantity: 14, cost: 320.00, responsible: 'Dr. Sarah Chen', condition: 'New', alertLevel: 8 },
      { id: 4, code: 'EM-004', name: 'Stethoscope', category: 'Diagnostic', department: 'Emergency', quantity: 8, cost: 1800.00, responsible: 'Dr. Sarah Chen', condition: 'Good', alertLevel: 5 },

      // Admin Department
      { id: 35, code: 'AD-001', name: 'Wheelchair', category: 'Furniture', department: 'Admin', quantity: 2, cost: 8500.00, responsible: 'Admin Officer Jane', condition: 'Poor', alertLevel: 3 },
      { id: 36, code: 'AD-002', name: 'Office desk', category: 'Furniture', department: 'Admin', quantity: 5, cost: 3500.00, responsible: 'Admin Officer Jane', condition: 'Good', alertLevel: 5 },
      { id: 37, code: 'AD-003', name: 'File cabinets', category: 'Furniture', department: 'Admin', quantity: 3, cost: 2800.00, responsible: 'Admin Officer Jane', condition: 'Fair', alertLevel: 4 },
      { id: 38, code: 'AD-004', name: 'Printer paper (ream)', category: 'Consumable', department: 'Admin', quantity: 10, cost: 250.00, responsible: 'Admin Officer Jane', condition: 'New', alertLevel: 6 },
    ];

    // ==================== LOCALSTORAGE FUNCTIONS ====================
    function loadInventory() {
      const saved = localStorage.getItem('medistock_inventory');
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          return defaultInventory;
        }
      }
      return defaultInventory;
    }

    function saveInventory(data) {
      localStorage.setItem('medistock_inventory', JSON.stringify(data));
    }

    // Load inventory from localStorage
    let inventory = loadInventory();
    
    // Calculate nextId based on existing data
    function getNextId() {
      if (inventory.length === 0) return 200;
      const maxId = Math.max(...inventory.map(item => item.id));
      return maxId + 1;
    }
    let nextId = getNextId();

    // ==================== STATE ====================
    let currentUser = null;

    // DOM refs
    const loginPage = document.getElementById('loginPage');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const loginDepartment = document.getElementById('loginDepartment');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const userBadge = document.getElementById('userBadge');
    const logoutBtn = document.getElementById('logoutBtn');
    const deptContainer = document.getElementById('departmentContainer');
    const totalSpan = document.getElementById('totalItems');
    const lowSpan = document.getElementById('lowItems');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const stockFilter = document.getElementById('stockFilter');
    const resetFilterBtn = document.getElementById('resetFilterBtn');

    const modal = document.getElementById('itemModal');
    const modalTitle = document.getElementById('modalTitle');
    const itemIdField = document.getElementById('itemIdField');
    const itemCode = document.getElementById('itemCode');
    const itemName = document.getElementById('itemName');
    const itemCategory = document.getElementById('itemCategory');
    const itemDepartment = document.getElementById('itemDepartment');
    const itemQuantity = document.getElementById('itemQuantity');
    const itemCost = document.getElementById('itemCost');
    const itemResponsible = document.getElementById('itemResponsible');
    const itemCondition = document.getElementById('itemCondition');
    const itemAlertLevel = document.getElementById('itemAlertLevel');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const openAddBtn = document.getElementById('openAddModal');
    const itemForm = document.getElementById('itemForm');

    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMessage');
    let toastTimer = null;

    // ==================== UTILITY FUNCTIONS ====================
    function showToast(text, icon = 'fa-check-circle', isError = false) {
      toastMsg.textContent = text;
      toast.querySelector('i').className = `fas ${icon}`;
      toast.classList.remove('error');
      if (isError) toast.classList.add('error');
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2700);
    }

    function getStockStatus(qty, alertLevel) {
      if (alertLevel === undefined || alertLevel === null) alertLevel = 10;
      if (qty <= Math.floor(alertLevel * 0.3)) return 'critical';
      if (qty < alertLevel) return 'low';
      return 'ok';
    }

    function statusLabel(qty, alertLevel) {
      const status = getStockStatus(qty, alertLevel);
      if (status === 'ok') return '<span class="stock-badge stock-ok">In stock</span>';
      if (status === 'low') return '<span class="stock-badge stock-low">Low stock</span>';
      return '<span class="stock-badge stock-critical">Critical</span>';
    }

    function conditionLabel(condition) {
      const map = {
        'New': 'condition-new',
        'Good': 'condition-good',
        'Fair': 'condition-fair',
        'Poor': 'condition-poor',
        'Repair': 'condition-repair'
      };
      const cls = map[condition] || 'condition-good';
      return `<span class="condition-badge ${cls}">${condition}</span>`;
    }

    // ==================== LOGIN / LOGOUT ====================
    function login(department) {
      currentUser = department;
      loginPage.style.display = 'none';
      dashboard.classList.add('active');
      userBadge.textContent = department;
      render();
      showToast(`✅ Logged in as ${department}`, 'fa-check-circle');
    }

    function logout() {
      currentUser = null;
      loginPage.style.display = 'block';
      dashboard.classList.remove('active');
      loginForm.reset();
      loginError.style.display = 'none';
      showToast('👋 Logged out successfully', 'fa-sign-out-alt');
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const dept = loginDepartment.value;
      const password = loginPassword.value.trim();

      if (!dept) {
        loginError.textContent = 'Please select a department.';
        loginError.style.display = 'block';
        return;
      }

      const deptData = DEPARTMENTS[dept];
      if (deptData && deptData.password === password) {
        loginError.style.display = 'none';
        login(dept);
      } else {
        loginError.textContent = '❌ Invalid password. Please try again.';
        loginError.style.display = 'block';
        loginPassword.value = '';
      }
    });

    logoutBtn.addEventListener('click', logout);

    // ==================== RENDER ====================
    function render() {
      if (!currentUser) return;

      const searchTerm = searchInput.value.toLowerCase().trim();
      const category = categoryFilter.value;
      const stock = stockFilter.value;

      let filteredItems = inventory.filter(item => {
        if (item.department !== currentUser) return false;
        if (searchTerm) {
          const match = item.name.toLowerCase().includes(searchTerm) ||
                         item.category.toLowerCase().includes(searchTerm) ||
                         item.code.toLowerCase().includes(searchTerm) ||
                         item.responsible.toLowerCase().includes(searchTerm);
          if (!match) return false;
        }
        if (category !== 'all' && item.category !== category) return false;
        if (stock !== 'all') {
          const status = getStockStatus(item.quantity, item.alertLevel);
          if (stock === 'ok' && status !== 'ok') return false;
          if (stock === 'low' && status !== 'low') return false;
          if (stock === 'critical' && status !== 'critical') return false;
        }
        return true;
      });

      const deptItems = inventory.filter(i => i.department === currentUser);
      totalSpan.textContent = deptItems.length;
      const lowCount = deptItems.filter(i => {
        const s = getStockStatus(i.quantity, i.alertLevel);
        return s === 'low' || s === 'critical';
      }).length;
      lowSpan.textContent = lowCount;

      const departments = {};
      filteredItems.forEach(item => {
        if (!departments[item.department]) {
          departments[item.department] = [];
        }
        departments[item.department].push(item);
      });

      const deptNames = Object.keys(departments).sort();

      if (deptNames.length === 0) {
        deptContainer.innerHTML = `
          <div style="text-align:center; padding: 60px 20px; color:#94a3b8;">
            <i class="fas fa-box-open" style="font-size:48px; margin-bottom:16px; display:block;"></i>
            No items found in ${currentUser} department
          </div>
        `;
        document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        return;
      }

      let html = '';
      deptNames.forEach(dept => {
        const items = departments[dept];
        const deptTotal = items.length;
        const deptLow = items.filter(i => {
          const s = getStockStatus(i.quantity, i.alertLevel);
          return s === 'low' || s === 'critical';
        }).length;

        let deptIcon = DEPARTMENTS[dept]?.icon || 'fa-building';

        html += `
          <div class="dept-section">
            <div class="dept-header">
              <h2><i class="fas ${deptIcon}"></i> ${dept}</h2>
              <div class="dept-stats">
                <span class="count"><i class="fas fa-boxes"></i> ${deptTotal} items</span>
                ${deptLow > 0 ? `<span class="low"><i class="fas fa-triangle-exclamation"></i> ${deptLow} low</span>` : ''}
              </div>
            </div>
            <div class="dept-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Cost</th>
                    <th>Responsible</th>
                    <th>Condition</th>
                    <th>Alert Level</th>
                    <th>Status</th>
                    <th style="text-align:center;">Actions</th>
                  </tr>
                </thead>
                <tbody>
        `;

        items.forEach(item => {
          const statusHtml = statusLabel(item.quantity, item.alertLevel);
          const conditionHtml = conditionLabel(item.condition);
          html += `
            <tr class="item-row">
              <td><span style="background:#f1f5f9; padding:4px 10px; border-radius:30px; font-weight:500; font-size:12px;">${item.code}</span></td>
              <td><span class="item-name"><i class="fas fa-cube"></i> ${item.name}</span></td>
              <td><span style="background:#eef2ff; padding:4px 12px; border-radius:30px; font-weight:500; font-size:13px;">${item.category}</span></td>
              <td><strong>${item.quantity}</strong></td>
              <td>₹${item.cost.toFixed(2)}</td>
              <td><span style="background:#f3e8ff; padding:4px 10px; border-radius:30px; font-weight:500; font-size:12px;">${item.responsible}</span></td>
              <td>${conditionHtml}</td>
              <td><span style="background:#f1f5f9; padding:4px 10px; border-radius:30px; font-weight:500; font-size:12px;">below ${item.alertLevel}</span></td>
              <td>${statusHtml}</td>
              <td style="text-align:center;">
                <div class="action-icons">
                  <i class="fas fa-pen-to-square edit-item" data-id="${item.id}" title="Edit" style="font-size:18px;"></i>
                  <button class="btn-remove delete-item" data-id="${item.id}">
                    <i class="fas fa-trash-can"></i> Remove
                  </button>
                </div>
              </td>
            </tr>
          `;
        });

        html += `
                </tbody>
              </table>
            </div>
          </div>
        `;
      });

      deptContainer.innerHTML = html;
      document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
    }

    // ==================== CRUD ====================
    function addItem(code, name, category, department, quantity, cost, responsible, condition, alertLevel) {
      if (department !== currentUser) {
        showToast('❌ You can only add items to your own department!', 'fa-circle-exclamation', true);
        return;
      }
      const newItem = { 
        id: nextId++, 
        code,
        name, 
        category, 
        department, 
        quantity: Number(quantity),
        cost: Number(cost),
        responsible,
        condition,
        alertLevel: Number(alertLevel)
      };
      inventory.push(newItem);
      saveInventory(inventory); // Save to localStorage
      
      // Force a full re-render
      render();
      
      // Force the table to refresh by clearing and re-rendering
      showToast(`➕ ${name} (${code}) added to ${department}`, 'fa-circle-plus');
    }

    function updateItem(id, code, name, category, department, quantity, cost, responsible, condition, alertLevel) {
      const index = inventory.findIndex(item => item.id === id);
      if (index === -1) return false;
      const existing = inventory[index];
      if (existing.department !== currentUser) {
        showToast('❌ You can only edit items in your own department!', 'fa-circle-exclamation', true);
        return false;
      }
      if (department !== currentUser) {
        showToast('❌ You cannot move items to another department!', 'fa-circle-exclamation', true);
        return false;
      }
      inventory[index] = { 
        ...existing, 
        code,
        name, 
        category, 
        department, 
        quantity: Number(quantity),
        cost: Number(cost),
        responsible,
        condition,
        alertLevel: Number(alertLevel)
      };
      saveInventory(inventory); // Save to localStorage
      
      // Force a full re-render
      render();
      
      showToast(`✏️ ${name} updated`, 'fa-pen-to-square');
      return true;
    }

    function deleteItem(id) {
      const item = inventory.find(i => i.id === id);
      if (!item) return;
      if (item.department !== currentUser) {
        showToast('❌ You can only delete items in your own department!', 'fa-circle-exclamation', true);
        return;
      }
      if (confirm(`Are you sure you want to remove "${item.name}" (${item.code}) from ${item.department}?`)) {
        inventory = inventory.filter(i => i.id !== id);
        saveInventory(inventory); // Save to localStorage
        
        // Force a full re-render
        render();
        
        showToast(`🗑️ "${item.name}" removed successfully`, 'fa-trash-can');
      }
    }

    // ==================== EVENTS ====================
    openAddBtn.addEventListener('click', () => {
      modalTitle.textContent = 'Add new item';
      itemIdField.value = '';
      itemForm.reset();
      itemCategory.value = 'Surgical';
      itemDepartment.value = currentUser;
      itemDepartment.disabled = true;
      itemCondition.value = 'New';
      itemAlertLevel.value = 10;
      modal.classList.add('active');
    });

    function closeModal() { 
      modal.classList.remove('active');
      itemDepartment.disabled = false;
    }
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    itemForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const id = itemIdField.value;
      const code = itemCode.value.trim();
      const name = itemName.value.trim();
      const category = itemCategory.value;
      const department = itemDepartment.value;
      const quantity = parseInt(itemQuantity.value, 10);
      const cost = parseFloat(itemCost.value);
      const responsible = itemResponsible.value.trim();
      const condition = itemCondition.value;
      const alertLevel = parseInt(itemAlertLevel.value, 10);
      
      if (!code || !name || isNaN(quantity) || quantity < 0 || isNaN(cost) || cost < 0 || !responsible || isNaN(alertLevel) || alertLevel < 1) {
        showToast('⚠️ Please fill in all fields correctly', 'fa-circle-exclamation', true);
        return;
      }
      if (id) {
        updateItem(parseInt(id), code, name, category, department, quantity, cost, responsible, condition, alertLevel);
      } else {
        addItem(code, name, category, department, quantity, cost, responsible, condition, alertLevel);
      }
      closeModal();
    });

    deptContainer.addEventListener('click', (e) => {
      const target = e.target.closest('i') || e.target.closest('button');
      if (!target) return;
      
      if (target.classList.contains('edit-item')) {
        const id = target.dataset.id;
        if (!id) return;
        const item = inventory.find(i => i.id === parseInt(id));
        if (!item) return;
        if (item.department !== currentUser) {
          showToast('❌ You can only edit items in your own department!', 'fa-circle-exclamation', true);
          return;
        }
        modalTitle.textContent = 'Edit item';
        itemIdField.value = item.id;
        itemCode.value = item.code;
        itemName.value = item.name;
        itemCategory.value = item.category;
        itemDepartment.value = item.department;
        itemDepartment.disabled = true;
        itemQuantity.value = item.quantity;
        itemCost.value = item.cost;
        itemResponsible.value = item.responsible;
        itemCondition.value = item.condition;
        itemAlertLevel.value = item.alertLevel || 10;
        modal.classList.add('active');
        return;
      }
      
      if (target.classList.contains('delete-item') || target.closest('.delete-item')) {
        const deleteBtn = target.closest('.delete-item');
        if (!deleteBtn) return;
        const id = deleteBtn.dataset.id;
        if (!id) return;
        deleteItem(parseInt(id));
        return;
      }
    });

    searchInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);
    stockFilter.addEventListener('change', render);
    resetFilterBtn.addEventListener('click', () => {
      searchInput.value = '';
      categoryFilter.value = 'all';
      stockFilter.value = 'all';
      render();
      showToast('Filters reset', 'fa-rotate-left');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // ==================== INIT ====================
    loginPage.style.display = 'block';
    dashboard.classList.remove('active');
  })();
</script>
